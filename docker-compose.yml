services:
  db:
    image: postgres:16
    container_name: internal_ops_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: internal_ops
    ports:
      - "5432:5432"
    volumes:
      - internal_ops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d internal_ops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  internal_ops_pgdata:
